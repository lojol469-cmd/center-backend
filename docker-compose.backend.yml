version: '3.8'

# ============================================================
# Backend CENTER - Permanent, auto-restart au boot Docker
# Commandes :
#   docker compose -f docker-compose.backend.yml up -d --build
#   docker compose -f docker-compose.backend.yml down
#   docker compose -f docker-compose.backend.yml logs -f backend
#   docker compose -f docker-compose.backend.yml logs -f moderation-api
#   docker compose -f docker-compose.backend.yml logs -f chat-api
# ============================================================

services:

  # ─── Backend Node.js ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: center-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
      - rtmp_recordings:/recordings
    environment:
      - NODE_ENV=production
      # URLs des APIs Python
      - MODERATION_API_URL=http://moderation-api:8001
      # chat-api tourne sur la machine hôte (Python local cu130)
      - CHAT_AGENT_URL=http://host.docker.internal:8002
      # Serveur RTMP (nginx-rtmp dans Docker)
      - RTMP_URL=rtmp://center-rtmp:1935/live
      - HLS_BASE_URL=http://center-rtmp:8080/hls
      # VLM API — validation screenshots paiement + modération visuelle
      - VLM_API_URL=http://vlm-api:8005
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/api/server-info || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      moderation-api:
        condition: service_healthy
    networks:
      - center-net

  # ─── API Python Modération (MiniLM-L6-v2) ───────────────────────────────────
  # Utilisée par routes/creation.js pour modérer le contenu et scorer les posts
  # Endpoint: POST /moderate, POST /algorithm/score, GET /health
  moderation-api:
    build:
      context: ./moderation_api
      dockerfile: Dockerfile
    container_name: center-moderation-api
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      # Priorité 1 : volume Docker (snapshot local monté)
      - MINILM_MODEL_PATH=/models/minilm/snapshots/c9745ed1d9f207416be6d2e6f8de32d1f16199bf
      # Si le snapshot n'existe pas à ce chemin exact, _find_model_path()
      # tente MODEL_CACHE_DIR puis télécharge depuis HuggingFace
      - MODEL_CACHE_DIR=/models
      - MODERATION_PORT=8001
    volumes:
      # Monter le modèle local en lecture seule
      # Le dossier models--sentence-transformers--all-MiniLM-L6-v2 est dans frontend-center/
      - type: bind
        source: ../frontend-center/models--sentence-transformers--all-MiniLM-L6-v2
        target: /models/minilm
        read_only: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    networks:
      - center-net

  # ─── API Python Chat Agent (FAISS + SentenceTransformer) ────────────────────
  # Utilisée par server.js pour le chat IA multimodal
  # Endpoint: POST /chat, POST /upload, GET /health
  # Modèle: SmolVLM-256M-Instruct 4-bit NF4 — lancé sur la machine hôte via START_CHAT_API.ps1
  # Pour lancer en Docker: docker compose -f docker-compose.backend.yml --profile docker-chat up -d chat-api
  chat-api:
    profiles: [docker-chat]
    build:
      context: .
      dockerfile: Dockerfile.chat
    container_name: center-chat-api
    restart: always
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - SENTENCE_TRANSFORMERS_HOME=/models/cache
      - HF_HOME=/models/cache
      - CHAT_PORT=8002
      # Chemin vers le modèle SmolVLM monté en bind mount
      - SMOLVLM_MODEL_PATH=/models/smolvlm
    volumes:
      # Cache des modèles SentenceTransformer (téléchargés au 1er démarrage)
      - chat_models_cache:/models/cache
      # Mémoire FAISS persistante
      - chat_faiss_storage:/app/storage
      # SmolVLM-256M-Instruct — modèle local en lecture seule
      - type: bind
        source: ../frontend-center/models--HuggingFaceTB--SmolVLM-256M-Instruct
        target: /models/smolvlm
        read_only: true
    # GPU NVIDIA (CUDA 13.1 / cu130) — nécessite nvidia-container-toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 180s
    networks:
      - center-net

  # ─── API Python Recommandation (MiniLM-L6-v2 food recommend) ───────────────
  # Utilisée par Flutter via /recommend/restaurants et /recommend/search
  # Endpoint: GET /recommend/restaurants, GET /recommend/search, GET /health
  food-recommend-api:
    build:
      context: .
      dockerfile: Dockerfile.recommend
    container_name: center-food-recommend
    restart: always
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - MINILM_MODEL_PATH=/models/minilm/snapshots/c9745ed1d9f207416be6d2e6f8de32d1f16199bf
      - MONGO_URI=${MONGO_URI}
      - PORT_RECOMMEND=8003
    volumes:
      - type: bind
        source: ../frontend-center/models--sentence-transformers--all-MiniLM-L6-v2
        target: /models/minilm
        read_only: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    networks:
      - center-net

  # ─── Serveur RTMP / HLS — streaming vidéo en direct ────────────────────────
  # RTMP entrant (OBS/encodeur) : rtmp://<IP>:1935/live/<stream_key>
  # HLS sortant (Flutter/lecteur) : http://<IP>:8080/hls/<stream_key>.m3u8
  rtmp-server:
    image: alfg/nginx-rtmp:latest
    container_name: center-rtmp
    restart: always
    # Use entrypoint script to create/chown dirs then start nginx
    command: ["sh", "/entrypoint.sh"]
    ports:
      - "1935:1935"   # RTMP  – émetteurs (OBS, encodeur, FFMPEG)
      - "8080:8080"   # HTTP  – segments HLS + stats
    volumes:
      - ./nginx-rtmp/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-rtmp/entrypoint.sh:/entrypoint.sh:ro
      - rtmp_hls_data:/tmp/hls
      - rtmp_recordings:/recordings
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - center-net

  # ─── Cloudflare Tunnel (fonctionne partout - hotspot + WiFi) ────────────────
  tunnel-cloudflare:
    image: cloudflare/cloudflared:latest
    container_name: center-tunnel-cf
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    command: tunnel --no-autoupdate --url http://backend:5000
    networks:
      - center-net

  # ─── Topocoin Wallet API (FastAPI / Solana SPL Token) ────────────────────────
  # Endpoints : /api/auth/register, /api/auth/login, /api/wallet/balance,
  #             /api/wallet/send_sol, /api/wallet/send_tpc, /api/wallet/mint_tpc
  topocoin-api:
    build:
      context: ../frontend-center/Topocoin-backend-api
      dockerfile: Dockerfile
    container_name: center-topocoin-api
    image: center-backend-topocoin-api:latest
    restart: always
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      - PORT=8004
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - center-net

  # ─── VLM API — SmolVLM-256M-Instruct 4-bit NF4 ────────────────────────────────
  # Validation visuelle de screenshots de paiement Airtel Money
  # VLM API v2.0 — SmolVLM 4-bit + MiniLM — Vision, Chat, Captions, Recommandations
  # Endpoints : GET /, GET /health, POST /chat, POST /validate-payment, POST /analyze-content,
  #             POST /describe-image, POST /video/caption, POST /video/auto-tags, POST /video/title,
  #             POST /video/description, POST /video/thumbnail-score, POST /video/moderation,
  #             GET /recommend/feed, POST /recommend/similar, POST /recommend/score
  vlm-api:
    build:
      context: .
      dockerfile: Dockerfile.vlm
    container_name: center-vlm-api
    restart: always
    ports:
      - "8005:8005"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - VLM_PORT=8005
      # SmolVLM — yeux (vision)
      - SMOLVLM_MODEL_PATH=/models/smolvlm
      # MiniLM — embeddings recommandations
      - MINILM_MODEL_PATH=/models/minilm
      # Mistral Kibali 7B — cerveau (raisonnement + modération)
      - KIBALI_MODEL_PATH=/models/kibali
      # MongoDB — pour l'index vidéo et les recommandations
      - MONGO_URI=${MONGO_URI:-mongodb://host.docker.internal:27017/myDatabase60}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-myDatabase60}
    volumes:
      # SmolVLM-256M-Instruct — modèle local en lecture seule
      - type: bind
        source: ../frontend-center/models--HuggingFaceTB--SmolVLM-256M-Instruct
        target: /models/smolvlm
        read_only: true
      # MiniLM-L6-v2 — modèle local en lecture seule (embeddings + recommandations)
      - type: bind
        source: ../frontend-center/models--sentence-transformers--all-MiniLM-L6-v2
        target: /models/minilm
        read_only: true
      # Mistral Kibali 7B — cerveau LLM local (raisonnement + modération)
      - type: bind
        source: ./kibali-final-merged
        target: /models/kibali
        read_only: true
    # GPU NVIDIA (CUDA 12.8) — nécessite nvidia-container-toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 180s
    networks:
      - center-net

  # ─── ngrok Tunnel (URL FIXE - fonctionne sur WiFi uniquement) ───────────────
  # URL fixe permanente : https://macabrely-subsatirical-ayana.ngrok-free.dev
  tunnel-ngrok:
    image: ngrok/ngrok:latest
    container_name: center-tunnel-ngrok
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    command: http --domain=macabrely-subsatirical-ayana.ngrok-free.dev http://backend:5000
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    networks:
      - center-net

volumes:
  uploads_data:
  chat_models_cache:
  chat_faiss_storage:
  rtmp_hls_data:
  rtmp_recordings:
  vlm_tmp_uploads:

networks:
  center-net:
    driver: bridge
