worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

# ─── RTMP — entrée flux OBS/encodeur ────────────────────────────────────────
rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;
      record off;

      # HLS — sortie lecture Flutter/navigateur
      hls on;
      hls_path /tmp/hls;
      hls_fragment  3s;
      hls_playlist_length 60s;

      # DASH (optionnel)
      # dash on;
      # dash_path /tmp/dash;

      # Autoriser tout émetteur (clé vérifiée côté Node.js)
      allow publish all;
      allow play   all;
    }
  }
}

# ─── HTTP — servir les segments HLS et les stats ─────────────────────────────
http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;

  server {
    listen 8080;

    # Segments HLS
    location /hls {
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t                    ts;
      }
      root /tmp;
      add_header Cache-Control   no-cache;
      add_header Access-Control-Allow-Origin  *;
      add_header Access-Control-Allow-Headers *;
    }

    # Page de stats RTMP (optionnel — debug)
    location /stat {
      rtmp_stat     all;
      rtmp_stat_stylesheet stat.xsl;
    }
    location /stat.xsl {
      root /usr/local/nginx/html;
    }

    # Health-check
    location /health {
      return 200 "rtmp-ok\n";
      add_header Content-Type text/plain;
    }
  }
}
