user root;
worker_processes auto;
error_log /dev/stderr warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

# ─── RTMP — entrée flux OBS/encodeur ────────────────────────────────────────
rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;

      # ── Enregistrement automatique du flux ──────────────────────────
      record all;
      record_path /recordings;
      record_suffix -%Y%m%d-%H%M%S.flv;
      record_unique on;

      # Callback backend quand l'enregistrement est terminé
      exec_record_done curl -s -X POST http://center-backend:5000/api/studio/live/record-done
        -H "Content-Type: application/x-www-form-urlencoded"
        -d "path=$path&name=$name&recorder=$recorder";

      # HLS — sortie lecture Flutter/navigateur
      hls on;
      hls_path /tmp/hls;
      hls_type live;          # live mode: minimal buffering
      hls_fragment  1s;       # 1-second segments → low latency
      hls_playlist_length 4s; # only 4 segments in playlist (≈4s max lag)

      # Autoriser tout émetteur (clé vérifiée côté Node.js)
      allow publish all;
      allow play   all;
    }
  }
}

# ─── HTTP — servir les segments HLS et les stats ─────────────────────────────
http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;

  server {
    listen 8080;

    # Segments HLS
    location /hls {
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t                    ts;
      }
      root /tmp;
      add_header Cache-Control   no-cache;
      add_header Access-Control-Allow-Origin  *;
      add_header Access-Control-Allow-Headers *;
    }

    # Fichiers enregistrés (FLV)
    location /recordings {
      alias /recordings;
      autoindex on;
      add_header Access-Control-Allow-Origin  *;
      types {
        video/x-flv flv;
      }
    }

    # Page de stats RTMP (optionnel — debug)
    location /stat {
      rtmp_stat     all;
      rtmp_stat_stylesheet stat.xsl;
    }
    location /stat.xsl {
      root /usr/local/nginx/html;
    }

    # Supprimer l'erreur favicon.ico
    location = /favicon.ico {
      return 204;
      access_log off;
      log_not_found off;
    }

    # Page d'accueil basique
    location = / {
      return 200 "CENTER RTMP Server OK\n";
      add_header Content-Type text/plain;
    }

    # Health-check
    location /health {
      return 200 "rtmp-ok\n";
      add_header Content-Type text/plain;
    }
  }
}
